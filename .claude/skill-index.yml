      deployed_to: ~/.claude/skills/triage
    - name: "watch"
      trigger: "Monitor files, URLs, or RSS feeds for changes \u2014 creates inbox notes when sources update. Use when setting up automated intake from external sources."
      path: .claude/skills/the-brain/watch/SKILL.md

