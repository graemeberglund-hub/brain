      deployed_to: ~/.claude/skills/resolve-feedback
    - name: "skill-recommend"
      trigger: "Context-aware skill suggestions \u2014 reads vault state, time, recent activity, and feedback history to recommend what to run next. Use when asking 'what should I do?'"
      path: .claude/skills/the-brain/skill-recommend/SKILL.md
    - name: "sync"
      trigger: "Sync git commits from registered repos into today's daily note with synthesis and knowledge graph. Use when user wants git commits reflected in daily notes."
      path: .claude/skills/the-brain/sync/SKILL.md
      deployed_to: ~/.claude/skills/sync
    - name: "triage"
