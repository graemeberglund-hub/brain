  the-brain-analysis:
    - name: "audit"
      trigger: "Comprehensive weekly 1M reasoning pass across the full vault. Surfaces lifecycle candidates, coherence tensions, prediction monitoring, cognitive signature evolution, and self-audit metrics. Interactive \u2014 user validates each finding."
