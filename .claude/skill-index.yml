      path: .claude/skills/the-brain-analysis/bridge/SKILL.md
      deployed_to: ~/.claude/skills/bridge
    - name: "briefing"
      trigger: "Generate an editorial daily briefing \u2014 The Mirror. A narrative HTML page that tells you about yourself through your vault data. Not a dashboard \u2014 a warm, honest, occasionally wry editorial voice."
      path: .claude/skills/the-brain-analysis/briefing-mirror/SKILL.md
      deployed_to: ~/.claude/skills/briefing-mirror
    - name: "challenge"
      trigger: "Adversarial epistemic prompts \u2014 argue against held positions, surface untested beliefs, and stress-test confidence levels. Use when wanting to challenge your own thinking."
      path: .claude/skills/the-brain-analysis/challenge/SKILL.md
    - name: "connect"
      trigger: "Find structural bridges between two topics in the vault. Use when user asks how two topics connect or relate."
      path: .claude/skills/the-brain-analysis/connect/SKILL.md
      deployed_to: ~/.claude/skills/connect
    - name: "consolidate"
      trigger: "Scan all subgraphs for cross-domain patterns, promote to cross-cutting layer. Run weekly/biweekly."
      path: .claude/skills/the-brain-analysis/consolidate/SKILL.md
      deployed_to: ~/.claude/skills/consolidate
    - name: "drift"
      trigger: "Detect unnamed themes and conceptual gaps across the vault, persist them to the emergent layer, and archive the run."
      path: .claude/skills/the-brain-analysis/drift/SKILL.md
      deployed_to: ~/.claude/skills/drift
    - name: "export"
      trigger: "Package a vault subset as a portable bundle \u2014 by tag, type, project, or explicit list. Resolves wikilinks, strips internal paths. Use when sharing vault content externally."
      path: .claude/skills/the-brain-analysis/export/SKILL.md
    - name: "memory-refresh"
      trigger: "Full-vault synthesis into living-tier memory files. Narrative assessment, not mechanical summary. Updates positions-summary, questions-summary, project-state, and decision-patterns from behavioral evidence."
      path: .claude/skills/the-brain-analysis/memory-refresh/SKILL.md
      deployed_to: ~/.claude/skills/memory-refresh
    - name: "publish"
      trigger: "Push a report, readable, or briefing artifact to a shareable location \u2014 Google Drive, local server, or clipboard. Use when sharing vault output externally."
      path: .claude/skills/the-brain-analysis/publish/SKILL.md
    - name: "report"
