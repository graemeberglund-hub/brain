      path: .claude/skills/the-brain/question/SKILL.md
      deployed_to: ~/.claude/skills/question
    - name: "reference"
      trigger: "Capture an external reference (article, video, tool, paper). Use when user shares a URL, article, video, tool, or paper."
      path: .claude/skills/the-brain/reference/SKILL.md
      deployed_to: ~/.claude/skills/reference
