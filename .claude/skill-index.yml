  # seo family - SEO operating system plus sub-skills
  seo:
    - name: "seo"
      trigger: "Comprehensive SEO analysis for any website or business type. Performs full site audits, single-page deep analysis, technical SEO checks (crawlability, indexability, Core Web Vitals with INP), schema markup detection/validation/generation, content quality assessment (E-E-A-T framework per Dec 2025 update extending to all competitive queries), image optimization, sitemap analysis, and Generative Engine Optimization (GEO) for AI Overviews, ChatGPT, and Perplexity citations. Analyzes AI crawler accessibility (GPTBot, ClaudeBot, PerplexityBot), llms.txt compliance, brand mention signals, and passage-level citability. Industry detection for SaaS, e-commerce, local business, publishers, agencies. Triggers on: \"SEO\", \"audit\", \"schema\", \"Core Web Vitals\", \"sitemap\", \"E-E-A-T\", \"AI Overviews\", \"GEO\", \"technical SEO\", \"content quality\", \"page speed\", \"structured data\"."
      path: .claude/skills/seo/seo/SKILL.md
      deployed_to: ~/.claude/skills/seo
    - name: "seo-audit"
      trigger: "Full website SEO audit with parallel subagent delegation. Crawls up to 500 pages, detects business type, delegates to 7 specialists, generates health score. Use when user says \"audit\", \"full SEO check\", \"analyze my site\", or \"website health check\"."
      path: .claude/skills/seo/seo/sub-skills/seo-audit/SKILL.md
    - name: "seo-competitor-pages"
      trigger: "Generate SEO-optimized competitor comparison and alternatives pages. Covers \"X vs Y\" layouts, \"alternatives to X\" pages, feature matrices, schema markup, and conversion optimization. Use when user says \"comparison page\", \"vs page\", \"alternatives page\", \"competitor comparison\", or \"X vs Y\"."
      path: .claude/skills/seo/seo/sub-skills/seo-competitor-pages/SKILL.md
    - name: "seo-content"
      trigger: "Content quality and E-E-A-T analysis with AI citation readiness assessment. Use when user says \"content quality\", \"E-E-A-T\", \"content analysis\", \"readability check\", \"thin content\", or \"content audit\"."
      path: .claude/skills/seo/seo/sub-skills/seo-content/SKILL.md
    - name: "seo-dataforseo"
      trigger: "Live SEO data via DataForSEO MCP server. SERP analysis (Google, Bing, Yahoo, YouTube), keyword research (volume, difficulty, intent, trends), backlink profiles, on-page analysis (Lighthouse, content parsing), competitor analysis, content analysis, business listings, AI visibility (ChatGPT scraper, LLM mention tracking), and domain analytics. Requires DataForSEO extension installed. Use when user says \"dataforseo\", \"live SERP\", \"keyword volume\", \"backlink data\", \"competitor data\", \"AI visibility check\", \"LLM mentions\", or \"real search data\"."
      path: .claude/skills/seo/seo/sub-skills/seo-dataforseo/SKILL.md
    - name: "seo-geo"
      trigger: "Optimize content for AI Overviews (formerly SGE), ChatGPT web search, Perplexity, and other AI-powered search experiences. Generative Engine Optimization (GEO) analysis including brand mention signals, AI crawler accessibility, llms.txt compliance, passage-level citability scoring, and platform-specific optimization. Use when user says \"AI Overviews\", \"SGE\", \"GEO\", \"AI search\", \"LLM optimization\", \"Perplexity\", \"AI citations\", \"ChatGPT search\", or \"AI visibility\"."
      path: .claude/skills/seo/seo/sub-skills/seo-geo/SKILL.md
    - name: "seo-hreflang"
      trigger: "Hreflang and international SEO audit, validation, and generation. Detects common mistakes, validates language/region codes, and generates correct hreflang implementations. Use when user says \"hreflang\", \"i18n SEO\", \"international SEO\", \"multi-language\", \"multi-region\", or \"language tags\"."
      path: .claude/skills/seo/seo/sub-skills/seo-hreflang/SKILL.md
    - name: "seo-images"
      trigger: "Image optimization analysis for SEO and performance. Checks alt text, file sizes, formats, responsive images, lazy loading, and CLS prevention. Use when user says \"image optimization\", \"alt text\", \"image SEO\", \"image size\", or \"image audit\"."
      path: .claude/skills/seo/seo/sub-skills/seo-images/SKILL.md
    - name: "seo-page"
      trigger: "Deep single-page SEO analysis covering on-page elements, content quality, technical meta tags, schema, images, and performance. Use when user says \"analyze this page\", \"check page SEO\", or provides a single URL for review."
      path: .claude/skills/seo/seo/sub-skills/seo-page/SKILL.md
    - name: "seo-plan"
      trigger: "Strategic SEO planning for new or existing websites. Industry-specific templates, competitive analysis, content strategy, and implementation roadmap. Use when user says \"SEO plan\", \"SEO strategy\", \"content strategy\", \"site architecture\", or \"SEO roadmap\"."
      path: .claude/skills/seo/seo/sub-skills/seo-plan/SKILL.md
