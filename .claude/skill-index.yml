# .claude/skill-index.yml
# Machine-readable skill catalog. Canonical source paths live in this repo.
# Personal-scope deployments use symlinks back into these source directories.
# Fields: name, trigger, path, deployed_to (optional)
# Used by: /find-skills and future skill discovery tooling

meta:
  updated: "2026-03-23"
  families:
    the-brain: 28
    the-brain-analysis: 14
    inputs: 4
    dev: 16
    writing: 5
    google: 20
    google-recipes: 9
    personas: 10
    research: 3
    seo: 14
    integrations: 1
    media: 1

vault_skills:
  # the-brain family - core vault capture, intake, and session rituals
  the-brain:
    - name: "boot"
      trigger: "Session start ritual \u2014 surface active context, inbox depth, top recommendations, available modes, and any queued inbox work. Read-only."
      path: .claude/skills/the-brain/boot/SKILL.md
      deployed_to: ~/.claude/skills/boot
    - name: "capture"
      trigger: "Capture a note, idea, or reference into the daily note and optionally inbox. Use when user shares a thought, idea, or observation worth remembering."
      path: .claude/skills/the-brain/capture/SKILL.md
      deployed_to: ~/.claude/skills/capture
    - name: "debrief"
      trigger: "Extract process insights, agent patterns, and learnings from a day's commits. Deeper than sync \u2014 reads full diffs and analyzes the shape of work. Use when user wants to reflect on how work happened, not just what."
      path: .claude/skills/the-brain/debrief/SKILL.md
      deployed_to: ~/.claude/skills/debrief
    - name: "decision"
      trigger: "Log a structured decision. Use when user states a decision, choice, or trade-off they've made."
      path: .claude/skills/the-brain/decision/SKILL.md
      deployed_to: ~/.claude/skills/decision
    - name: "delegate"
      trigger: "Decompose a complex request into skill calls \u2014 natural language intent to structured execution plan. Use when a request spans multiple skills."
      path: .claude/skills/the-brain/delegate/SKILL.md
    - name: "digest"
      trigger: "Run epistemic metabolism \u2014 process new intake against existing positions and questions, emit events to the ledger. Use when user wants to digest recent captures, or periodically to keep the knowledge system current."
      path: .claude/skills/the-brain/digest/SKILL.md
      deployed_to: ~/.claude/skills/digest
    - name: "domain-seed"
      trigger: "Pre-contextualize a vault for a specific domain \u2014 scaffold starter positions, questions, areas, and curated skill subset. Use when onboarding a new domain or client."
      path: .claude/skills/the-brain/domain-seed/SKILL.md
    - name: "feedback-capture"
      trigger: "Log skill output quality \u2014 accepted, edited, rejected, or deferred. Builds the learning signal for skill improvement. Use when recording whether a skill output was useful."
      path: .claude/skills/the-brain/feedback-capture/SKILL.md
    - name: "guided-tour"
      trigger: "Interactive walkthrough of core vault skills using your real data. Runs 6 skills with narration. Use when onboarding or wanting a refresher on what the system does."
      path: .claude/skills/the-brain/guided-tour/SKILL.md
    - name: "handoff"
      trigger: "Session end ritual \u2014 record decisions, flag unresolved questions, surface inbox depth, update active context. Writes to daily note and active-context.md only."
      path: .claude/skills/the-brain/handoff/SKILL.md
      deployed_to: ~/.claude/skills/handoff
    - name: "repo-health"
      trigger: "Multi-phase repo health workstream \u2014 naming conventions, CLAUDE.md accuracy, manifest integrity, frontmatter, link integrity, graph staleness, git hygiene. Run periodically to catch drift."
      path: .claude/skills/the-brain/repo-health/SKILL.md
      deployed_to: ~/.claude/skills/repo-health
    - name: "health-check"
      trigger: "Fast operational health scan \u2014 inbox depth, stale positions, broken links, scheduler status, skill integrity. Use when checking if the vault is working."
      path: .claude/skills/the-brain/health-check/SKILL.md
    - name: "ingest"
      trigger: "Thin dispatcher for ingesting content into the vault. Routes to the right extraction skill based on declared type. Use when user says \"ingest {type} {path}\"."
      path: .claude/skills/the-brain/ingest/SKILL.md
      deployed_to: ~/.claude/skills/ingest
    - name: "mode"
      trigger: "Crystallize current working context into a reusable mode loadout. Save, list, or load named cognitive stances for cross-session re-entry."
      path: .claude/skills/the-brain/mode/SKILL.md
      deployed_to: ~/.claude/skills/mode
    - name: "notify"
      trigger: "Send alerts when vault conditions are met \u2014 inbox overflow, stale positions, missed schedules. Use when setting up push-based vault monitoring."
      path: .claude/skills/the-brain/notify/SKILL.md
    - name: "onboard"
      trigger: "Interactive first contact + vault scaffolding. Greets the user with pre-seed context (or conversational fallback), communicates the product thesis, seeds areas/positions/questions, and initializes the absorption pipeline."
      path: .claude/skills/the-brain/onboard/SKILL.md
      deployed_to: ~/.claude/skills/onboard
    - name: "playbook"
      trigger: "Create, run, and manage named workflows with conditional logic and decision points. User-facing skill orchestration. Use when building or running reusable workflows."
      path: .claude/skills/the-brain/playbook/SKILL.md
    - name: "position"
      trigger: "Create or update a position/thesis note. Use when user states a belief, thesis, or position they hold or want to track."
      path: .claude/skills/the-brain/position/SKILL.md
      deployed_to: ~/.claude/skills/position
    - name: "pre-seed"
      trigger: "Research phase \u2014 build a profile of a new user from public information before interactive onboarding. Writes to knowledge/pre-seed.yml. Runs unattended."
      path: .claude/skills/the-brain/pre-seed/SKILL.md
      deployed_to: ~/.claude/skills/pre-seed
    - name: "profile-init"
      trigger: "Legacy first-run interview \u2014 manual 7-question form. Use /onboard instead for the recommended experience."
      path: .claude/skills/the-brain/profile-init/SKILL.md
    - name: "question"
